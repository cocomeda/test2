<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoCoめだか 無人販売所</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <style>
        :root {
            --bg-color: #F8F5F0;
            --main-text: #333333;
            --accent-color: #8E9775;
            --card-bg: #ffffff;
            --border-color: #E0DDD5;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            margin: 0; padding: 0; line-height: 1.6;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* --- ローディング --- */
        #loading {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid var(--accent-color); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- ヘッダー --- */
        header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        .logo-main { font-size: 1.6rem; letter-spacing: 0.2em; margin: 0; font-weight: 700; }
        .logo-sub { font-size: 0.8rem; letter-spacing: 0.4em; color: #777; }

        /* --- ステータスカード --- */
        .status-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px; position: relative;
        }
        .rank-info { flex-grow: 1; }
        .rank-label { font-size: 0.75rem; color: #888; }
        .rank-value { 
            font-size: 1.1rem; font-weight: bold; display: inline-block;
            padding: 2px 15px; border-radius: 20px; border: 1px solid var(--border-color);
            margin-top: 5px; transition: background-color 0.3s;
        }
        .point-display { text-align: right; margin-right: 15px; }
        .point-val { font-size: 2.2rem; font-weight: bold; }
        .point-unit { font-size: 0.9rem; margin-left: 2px; }

        .progress-track {
            width: 8px; height: 60px; background: #eee;
            border-radius: 4px; position: relative;
        }
        .progress-fill {
            width: 100%; background: var(--accent-color);
            border-radius: 4px; position: absolute; bottom: 0;
            transition: height 0.8s ease-out;
        }

        /* --- メニュー --- */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .menu-item { text-decoration: none; color: var(--main-text); text-align: center; }
        .menu-icon {
            width: 100%; aspect-ratio: 1/1; background: var(--card-bg);
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            border: 1px solid var(--border-color); overflow: hidden;
        }
        .menu-icon img { width: 100%; height: 100%; object-fit: cover; }
        .menu-label { font-size: 0.7rem; margin-top: 6px; font-weight: bold; }

        /* --- セクション --- */
        .info-section {
            background: var(--card-bg); border-radius: 12px; padding: 18px;
            margin-bottom: 15px; font-size: 0.8rem; border: 1px solid var(--border-color);
        }
        h2 { font-size: 0.95rem; border-left: 4px solid var(--accent-color); padding-left: 10px; margin: 0 0 12px 0; }
        ul { padding-left: 1.2em; margin: 0; }
        li { margin-bottom: 6px; }

        footer { text-align: center; font-size: 0.7rem; color: #aaa; padding: 30px 0; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <header>
            <h1 class="logo-main">CoCoめだか</h1>
            <div class="logo-sub">無人販売所</div>
        </header>

        <section class="status-card">
            <div class="rank-info">
                <div class="rank-label">CURRENT RANK</div>
                <div class="rank-value" id="user-rank">---</div>
            </div>
            <div class="point-display">
                <span class="point-val" id="user-points">0</span><span class="point-unit">℗</span>
            </div>
            <div class="progress-track">
                <div id="progressBar_vertical" class="progress-fill" style="height: 0%;"></div>
            </div>
        </section>

        <nav class="menu-grid">
            <a href="QRCR_r.html" class="menu-item">
                <div class="menu-icon"><img src="IMG/qr.jpg" alt="QR"></div>
                <div class="menu-label">QRリーダー</div>
            </a>
            <a href="numberForm.html" class="menu-item">
                <div class="menu-icon"><img src="IMG/form.jpg" alt="入力"></div>
                <div class="menu-label">コード入力</div>
            </a>
            <a href="reservation.html" class="menu-item">
                <div class="menu-icon"><img src="IMG/reserve.jpg" alt="予約"></div>
                <div class="menu-label">予約注文</div>
            </a>
            <a href="list_auction3.html" class="menu-item">
                <div class="menu-icon"><img src="IMG/u_c.jpg" alt="準備中"></div>
                <div class="menu-label">準備中</div>
            </a>
            <a href="list_auction.html" class="menu-item">
                <div class="menu-icon"><img src="IMG/quiz.jpg" alt="クイズ"></div>
                <div class="menu-label">クイズ</div>
            </a>
            <a href="list_auction2.html" class="menu-item">
                <div class="menu-icon"><img src="IMG/rou.jpg" alt="抽選"></div>
                <div class="menu-label">ルーレット</div>
            </a>
        </nav>

        <div class="info-section">
            <h2>ポイント取得方法</h2>
            <ul>
                <li>商品記載の4桁の数字を登録する。</li>
                <li>専用QRコードを読み取る（1日1回）。</li>
                <li>クイズに正解する。</li>
            </ul>
        </div>

        <footer>&copy; Coco Medaka35</footer>
    </div>

    <script>
        // LIFF ID
        const MY_LIFF_ID = '1657196041-ALeOLrEa';
        // GAS URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwU-jlTWnEyMNN7WHoD-tQjFyV_7opWSvNSB6n4nDqub7Hr7TDLmwHW3FBgmkfZ2VEfFw/exec';

        $(window).on("load", function() {
            // ローディング画面の制御
            setTimeout(function() {
                $("#loading").fadeOut(500, function() {
                    $("#main-content").fadeIn(500);
                });
            }, 800);

            // LIFFの初期化実行
            initializeLiff();
        });

        function initializeLiff() {
            liff.init({ liffId: MY_LIFF_ID })
                .then(() => {
                    if (liff.isLoggedIn()) {
                        sendIdTokenToGAS();
                    } else {
                        // ブラウザ環境（ローカル）では自動ログインさせない
                        if (!liff.isInClient()) {
                            console.log("Not in LINE client. Please login on LINE.");
                        } else {
                            liff.login();
                        }
                    }
                })
                .catch((err) => {
                    console.error("LIFF Initialization failed", err);
                });
        }

        function sendIdTokenToGAS() {
            const idToken = liff.getIDToken();
            if (!idToken) return;

            $.ajax({
                url: GAS_URL,
                type: 'POST',
                data: { idToken: idToken },
                success: function (response) {
                    try {
                        const jsonData = JSON.parse(response);
                        updateUI(jsonData);
                    } catch (e) {
                        console.error("Data Parse Error", e);
                    }
                },
                error: function (error) {
                    console.error("GAS Connection Error", error);
                }
            });
        }

        function updateUI(jsonData) {
            // スコアとランクの表示更新
            $("#user-points").text(jsonData.score);
            $("#user-rank").text(jsonData.rank);
            
            // プログレスバー更新
            const rate = (jsonData.progress_rate * 100) || 0;
            $("#progressBar_vertical").css("height", rate + "%");

            // ランク別カラー設定
            const rankColors = {
                "レギュラー": "#f5deb3",
                "シルバー": "#e8e8e8",
                "ゴールド": "#f0e68c",
                "プラチナ": "#add8e6",
                "ダイヤモンド": "#b0c4de"
            };

            if (rankColors[jsonData.rank]) {
                $("#user-rank").css({
                    "background-color": rankColors[jsonData.rank],
                    "border-color": "transparent"
                });
            }
        }
    </script>
</body>
</html>
